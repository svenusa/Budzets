<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Bilance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .karte {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .liela {
            font-size: 24px;
            font-weight: bold;
        }

        a {
            color: #2d7ef7;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="karte">
    <h1>Bilance</h1>

    <p><strong>Ienākumi:</strong> {{ "%.2f"|format(ienakumi) }} €</p>
    <p><strong>Izdevumi:</strong> {{ "%.2f"|format(izdevumi) }} €</p>
    <p class="liela">Bilance: {{ "%.2f"|format(bilance) }} €</p>

    <p><a href="/">Atpakaļ uz sākumlapu</a></p>
</div>

</body>
</html>
